name: Fetch YouTube Analytics

on:
  schedule:
    # Every 4 hours at :00 UTC (00, 04, 08, 12, 16, 20)
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run fetch
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_metrics.py

      - name: Commit updated DB
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.db /tmp/data.db.new
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.db.new data.db
          git add data.db
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update analytics snapshot"
            git push
          fi
